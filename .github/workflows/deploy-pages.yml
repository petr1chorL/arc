name: Deploy Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [master]

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.CLOUDFLARE_PAGES_AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'arc-one' }}
      CLOUDFLARE_PAGES_PRODUCTION_BRANCH: ${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH || 'master' }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Check required deployment settings
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"
          test -n "$CLOUDFLARE_PAGES_PRODUCTION_BRANCH"
          test -n "$VITE_API_BASE_URL"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --run

      - name: Verify deployment configuration
        run: npm run deploy:check

      - name: Build Cloudflare Pages artifact
        run: npm run build:pages

      - name: Ensure Cloudflare Pages project exists
        run: |
          npx wrangler@4 pages project list --json > pages-projects.json
          if node -e "const fs = require('node:fs'); const name = process.env.CLOUDFLARE_PAGES_PROJECT; const projects = JSON.parse(fs.readFileSync('pages-projects.json', 'utf8')); process.exit(projects.some((project) => project.name === name) ? 0 : 1)"; then
            echo "Cloudflare Pages project already exists: $CLOUDFLARE_PAGES_PROJECT"
          else
            npx wrangler@4 pages project create "$CLOUDFLARE_PAGES_PROJECT" --production-branch "$CLOUDFLARE_PAGES_PRODUCTION_BRANCH"
          fi

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch "$CLOUDFLARE_PAGES_PRODUCTION_BRANCH"
