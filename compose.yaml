services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arc_one}
      POSTGRES_USER: ${POSTGRES_USER:-arc_one}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - arc_one_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arc_one} -d ${POSTGRES_DB:-arc_one}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-arc_one}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arc_one}
      AGENT_API_ALLOWED_BINDINGS: ${AGENT_API_ALLOWED_BINDINGS:-}
      AGENT_API_MAX_RESPONSE_BYTES: ${AGENT_API_MAX_RESPONSE_BYTES:-1048576}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  execution-worker:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-arc_one}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arc_one}
      AGENT_API_ALLOWED_BINDINGS: ${AGENT_API_ALLOWED_BINDINGS:-}
      AGENT_API_MAX_RESPONSE_BYTES: ${AGENT_API_MAX_RESPONSE_BYTES:-1048576}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.worker", "--worker-id", "compose-worker", "--poll-interval", "2"]

  notification-worker:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-arc_one}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arc_one}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "app.notification_worker", "--poll-interval", "2"]

volumes:
  arc_one_postgres:
