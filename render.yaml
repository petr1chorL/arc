services:
  - type: web
    name: arc-one-api
    runtime: python
    rootDir: apps/api
    buildCommand: python -m pip install -e ".[postgres]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: arc-one-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: HSTS_ENABLED
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: MODEL_API_KEY
        sync: false
      - key: MODEL_BASE_URL
        value: https://api.deepseek.com
      - key: MODEL_DEFAULT_MODEL
        value: deepseek-v4-pro

databases:
  - name: arc-one-postgres
    plan: free
